naftiko: 1.0.0-alpha2
info:
  label: Browserbase API — Contexts
  description: >-
    Browserbase Contexts capability covering reusable encrypted browser
    contexts that persist cookies, localStorage, and authenticated state
    across sessions. Self-contained Naftiko capability covering one
    Browserbase business surface.
  tags:
    - Browserbase
    - Contexts
    - Sessions
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      BROWSERBASE_API_KEY: BROWSERBASE_API_KEY
capability:
  consumes:
    - type: http
      namespace: contexts
      baseUri: https://api.browserbase.com/v1
      description: Browserbase Contexts consumes block. Self-contained, no shared references.
      resources:
        - name: contexts
          path: /contexts
          operations:
            - name: createcontext
              method: POST
              description: Browserbase Create Context
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Create-context body { projectId }.
                  required: true
        - name: contexts-id
          path: /contexts/{id}
          operations:
            - name: getcontext
              method: GET
              description: Browserbase Get Context
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: updatecontext
              method: PUT
              description: Browserbase Update Context (rotate upload URL)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
      authentication:
        type: apikey
        key: X-BB-API-Key
        value: '{{env.BROWSERBASE_API_KEY}}'
        placement: header
  exposes:
    - type: rest
      namespace: contexts-rest
      port: 8080
      description: REST adapter for Browserbase Contexts. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/contexts
          name: contexts
          description: REST surface for contexts.
          operations:
            - method: POST
              name: createcontext
              description: Browserbase Create Context
              call: contexts.createcontext
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/contexts/{id}
          name: contexts-id
          description: REST surface for contexts-id.
          operations:
            - method: GET
              name: getcontext
              description: Browserbase Get Context
              call: contexts.getcontext
              outputParameters:
                - type: object
                  mapping: $.
            - method: PUT
              name: updatecontext
              description: Browserbase Update Context
              call: contexts.updatecontext
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: contexts-mcp
      port: 9090
      transport: http
      description: MCP adapter for Browserbase Contexts. One tool per consumed operation.
      tools:
        - name: browserbase-create-context
          description: Browserbase Create Context
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: contexts.createcontext
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: browserbase-get-context
          description: Browserbase Get Context
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: contexts.getcontext
          outputParameters:
            - type: object
              mapping: $.
        - name: browserbase-update-context
          description: Browserbase Update Context
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: contexts.updatecontext
          outputParameters:
            - type: object
              mapping: $.
